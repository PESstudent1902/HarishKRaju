<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Harish K Raju</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  
  <!-- Inline Styles to keep it fast and dependency-free -->
  <style>
    :root {
      --bg: #0d1117;
      --gold: #c9a84c;
      --gold-l: #e8c97a;
      --text: #ede9de;
      --muted: #8b95a8;
      --glass: rgba(20, 27, 45, 0.75);
      --glass-b: rgba(201, 168, 76, 0.18);
    }
    
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }
    
    /* Background Galaxy Orbs */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 1;
    }
    .orb-1 {
      width: 300px;
      height: 300px;
      background: #7c3aed;
      top: 10%;
      left: 10%;
    }
    .orb-2 {
      width: 400px;
      height: 400px;
      background: #c9a84c;
      bottom: 10%;
      right: 10%;
    }
    
    .container {
      position: relative;
      z-index: 2;
      background: var(--glass);
      border: 1px solid var(--glass-b);
      border-radius: 20px;
      padding: 60px 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    
    h1 {
      font-family: 'Cinzel', serif;
      font-size: 7.5rem;
      font-weight: 700;
      line-height: 1;
      color: var(--gold);
      margin-bottom: 12px;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--gold-l) 30%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 30px rgba(201, 168, 76, 0.15);
    }
    
    h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 18px;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    
    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    
    .btn-home {
      display: inline-block;
      text-decoration: none;
      font-family: 'Outfit', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #0d1117;
      background: linear-gradient(135deg, var(--gold-l) 0%, var(--gold) 100%);
      padding: 14px 36px;
      border-radius: 30px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 4px 15px rgba(201, 168, 76, 0.25);
    }
    
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(201, 168, 76, 0.4);
    }
    
    .btn-home:active {
      transform: translateY(-1px);
    }
    
    @media (max-width: 480px) {
      h1 { font-size: 5.5rem; }
      h2 { font-size: 1.3rem; }
      p { font-size: 0.88rem; }
      .container { padding: 40px 24px; }
    }
  </style>
</head>
<body>
  
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  
  <div class="container">
    <h1>404</h1>
    <h2>Path Not Found</h2>
    <p>The page you are looking for doesn't exist, has been moved, or is temporarily unavailable.</p>
    <a href="/" class="btn-home">Back to Homepage</a>
  </div>
  
</body>
</html>
